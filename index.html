<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CompareMyReturns</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=PT+Serif:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <a href="#main" class="skip-link">Skip to main content</a>

    <!-- HEADER PARTIAL SLOT -->
    <div id="header-slot"></div>

    <!-- HERO -->
    <section class="hero">
        <div class="container hero-content">
            <h1 class="hero-title">See how your money could have grown</h1>
            <p class="hero-sub">Compare your returns instantly using real-time prices and currency conversions.</p>
        </div>
    </section>

    <main id="main" class="container">
        <section class="app-card" id="app">
            <form id="compare-form" class="form-grid" autocomplete="off">
                <label for="currency">Select Currency</label>
                <select id="currency"></select>

                <label for="asset">Select Asset</label>
                <select id="asset"></select>

                <label for="amount">
                    Amount (<span id="amount-unit">USD</span>)
                </label>
                <input id="amount" type="number" min="1" step="1" inputmode="decimal" placeholder="1">


                <fieldset class="timeframe">
                    <legend>Select Time Period</legend>
                    <label class="radio"><input type="radio" name="period" value="7d" checked><span>7
                            Days</span></label>
                    <label class="radio"><input type="radio" name="period" value="30d"><span>30 Days</span></label>
                    <label class="radio"><input type="radio" name="period" value="1y"><span>1 Year</span></label>
                </fieldset>

                <button type="submit" class="btn-primary">COMPARE MY RETURNS</button>
            </form>

            <div id="results" class="results"></div>
            <p class="stamp"></p>
        </section>
    </main>

    <!-- FOOTER PARTIAL SLOT -->
    <div id="footer-slot"></div>

    <!-- Only main.js; it imports and runs the partial loader -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
